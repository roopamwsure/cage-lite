name: Publish CAGE-lite

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to release, for example 0.1.1
        required: true
        type: string

concurrency:
  group: publish-cage-lite-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Build and verify v${{ inputs.version }}
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ inputs.version }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Validate release version and tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use the form X.Y.Z."
            exit 1
          fi

          actual_tag="$(git describe --tags --exact-match)"
          expected_tag="v${VERSION}"

          if [[ "$actual_tag" != "$expected_tag" ]]; then
            echo "Expected tag $expected_tag but checked out $actual_tag."
            exit 1
          fi

          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          version = os.environ["VERSION"]

          with Path("pyproject.toml").open("rb") as handle:
              project = tomllib.load(handle)["project"]

          configured_version = project["version"]

          if configured_version != version:
              raise SystemExit(
                  "pyproject.toml version does not match the requested "
                  f"release: {configured_version!r} != {version!r}"
              )

          print(f"Verified package version {configured_version}")
          PY

      - name: Install package and release validation tools
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install pytest build twine
          python -m pip install .

      - name: Verify installed package
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from importlib.metadata import version

          expected = os.environ["VERSION"]
          installed = version("cage-lite")

          if installed != expected:
              raise SystemExit(
                  f"Installed version {installed!r} does not match "
                  f"expected version {expected!r}"
              )

          print(f"Verified installed cage-lite {installed}")
          PY

          python -c "import cage_lite"
          python -c "import cage_lite.core.receipt"
          python -c "import cage_lite.ui.app_data"

      - name: Run test suite
        run: python -m pytest -q

      - name: Build distributions
        run: |
          set -euo pipefail

          rm -rf dist build release-bundle
          find . -maxdepth 1 -type d -name "*.egg-info" -exec rm -rf {} +

          python -m build
          python -m twine check dist/*

      - name: Verify distribution contents and metadata
        env:
          VERSION: ${{ inputs.version }}
        shell: python
        run: |
          from pathlib import Path
          import os
          import re
          import tarfile
          import zipfile

          version = os.environ["VERSION"]
          dist = Path("dist")

          wheel = dist / f"cage_lite-{version}-py3-none-any.whl"
          source_distribution = dist / f"cage_lite-{version}.tar.gz"

          actual_files = sorted(
              path
              for path in dist.iterdir()
              if path.is_file()
          )

          expected_files = sorted(
              [
                  wheel,
                  source_distribution,
              ]
          )

          if actual_files != expected_files:
              names = ", ".join(path.name for path in actual_files)
              raise SystemExit(
                  "Expected exactly one wheel and one source "
                  f"distribution. Found: {names}"
              )

          with zipfile.ZipFile(wheel) as archive:
              wheel_files = set(archive.namelist())

              metadata_files = [
                  name
                  for name in wheel_files
                  if name.endswith(".dist-info/METADATA")
              ]

              if len(metadata_files) != 1:
                  raise SystemExit(
                      "Wheel must contain exactly one METADATA file."
                  )

              metadata = archive.read(
                  metadata_files[0]
              ).decode("utf-8")

          required_wheel_files = {
              "cage_lite/ui/assets/cage_logo.png",
              "cage_lite/ui/app.py",
              "cage_lite/ui/receipt_viewer_v1.py",
          }

          missing_wheel_files = (
              required_wheel_files - wheel_files
          )

          if missing_wheel_files:
              missing = ", ".join(
                  sorted(missing_wheel_files)
              )
              raise SystemExit(
                  f"Wheel is missing required files: {missing}"
              )

          if not any(
              name.endswith(".dist-info/licenses/LICENSE")
              for name in wheel_files
          ):
              raise SystemExit(
                  "Wheel does not contain LICENSE."
              )

          if not any(
              name.endswith(".dist-info/licenses/NOTICE")
              for name in wheel_files
          ):
              raise SystemExit(
                  "Wheel does not contain NOTICE."
              )

          if f"\nVersion: {version}\n" not in (
              f"\n{metadata}\n"
          ):
              raise SystemExit(
                  "Wheel metadata contains an unexpected version."
              )

          image_sources = re.findall(
              r'<img\b[^>]*\bsrc="([^"]+)"',
              metadata,
              flags=re.IGNORECASE | re.DOTALL,
          )

          if len(image_sources) != 5:
              raise SystemExit(
                  "Expected five README image references in "
                  f"package metadata, found {len(image_sources)}."
              )

          relative_sources = [
              source
              for source in image_sources
              if not source.startswith("https://")
          ]

          if relative_sources:
              bad_sources = ", ".join(relative_sources)
              raise SystemExit(
                  "Package metadata contains non-HTTPS image "
                  f"references: {bad_sources}"
              )

          with tarfile.open(
              source_distribution,
              "r:gz",
          ) as archive:
              source_files = set(archive.getnames())

              readme_members = [
                  member
                  for member in archive.getmembers()
                  if member.name.endswith("/README.md")
              ]

              if len(readme_members) != 1:
                  raise SystemExit(
                      "Source distribution must contain exactly "
                      "one README.md."
                  )

              readme_file = archive.extractfile(
                  readme_members[0]
              )

              if readme_file is None:
                  raise SystemExit(
                      "Unable to read README.md from source "
                      "distribution."
                  )

              source_readme = readme_file.read().decode(
                  "utf-8"
              )

          if not any(
              name.endswith("/LICENSE")
              for name in source_files
          ):
              raise SystemExit(
                  "Source distribution does not contain LICENSE."
              )

          if not any(
              name.endswith("/NOTICE")
              for name in source_files
          ):
              raise SystemExit(
                  "Source distribution does not contain NOTICE."
              )

          source_image_references = re.findall(
              r'<img\b[^>]*\bsrc="([^"]+)"',
              source_readme,
              flags=re.IGNORECASE | re.DOTALL,
          )

          if len(source_image_references) != 5:
              raise SystemExit(
                  "Expected five README image references in "
                  "the source distribution."
              )

          if any(
              not source.startswith("https://")
              for source in source_image_references
          ):
              raise SystemExit(
                  "Source distribution README contains a "
                  "non-HTTPS image reference."
              )

          print(f"Verified {wheel.name}")
          print(f"Verified {source_distribution.name}")
          print("Verified five absolute HTTPS README images")

      - name: Prepare release bundle and checksums
        run: |
          set -euo pipefail

          mkdir -p release-bundle/dist

          cp dist/*.whl release-bundle/dist/
          cp dist/*.tar.gz release-bundle/dist/

          (
            cd release-bundle/dist
            sha256sum *.whl *.tar.gz > ../SHA256SUMS.txt
          )

          cat release-bundle/SHA256SUMS.txt

      - name: Store verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cage-lite-${{ inputs.version }}-distributions
          path: release-bundle/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish-testpypi:
    name: Publish v${{ inputs.version }} to TestPyPI
    needs:
      - prepare-release

    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/cage-lite

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Retrieve verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cage-lite-${{ inputs.version }}-distributions
          path: release/

      - name: Reverify distributions before TestPyPI
        run: |
          set -euo pipefail

          (
            cd release/dist
            sha256sum --check ../SHA256SUMS.txt
          )

          test "$(find release/dist -maxdepth 1 -type f | wc -l)" -eq 2

          ls -l release/dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: release/dist/
          print-hash: true
          attestations: true

  publish-pypi:
    name: Publish v${{ inputs.version }} to PyPI
    needs:
      - publish-testpypi

    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/cage-lite

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Retrieve the TestPyPI-verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cage-lite-${{ inputs.version }}-distributions
          path: release/

      - name: Reverify distributions before PyPI
        run: |
          set -euo pipefail

          (
            cd release/dist
            sha256sum --check ../SHA256SUMS.txt
          )

          test "$(find release/dist -maxdepth 1 -type f | wc -l)" -eq 2

          ls -l release/dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: release/dist/
          print-hash: true
          attestations: true

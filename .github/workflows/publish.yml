name: Publish CAGE-lite

on:
  workflow_dispatch:

concurrency:
  group: publish-cage-lite
  cancel-in-progress: false

jobs:
  prepare-v0-1-0:
    name: Prepare verified v0.1.0 distributions
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Download v0.1.0 release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p release-assets dist

          gh release download v0.1.0 \
            --repo "$GITHUB_REPOSITORY" \
            --dir release-assets \
            --pattern "cage_lite-0.1.0-py3-none-any.whl" \
            --pattern "cage_lite-0.1.0.tar.gz" \
            --pattern "SHA256SUMS.txt"

      - name: Verify release artifact hashes
        run: |
          set -euo pipefail

          cat > expected-sha256sums.txt <<'EOF'
          2f82d54fa650291671800d1390259f3f668abe9901a0a2374051b87a682f0b84  cage_lite-0.1.0.tar.gz
          2e5de3fb8c9671f1d1163153d65cab86d3ea81fc76177f526d3d2512966da4e3  cage_lite-0.1.0-py3-none-any.whl
          EOF

          tr -d '\r' \
            < release-assets/SHA256SUMS.txt \
            > release-assets/SHA256SUMS.normalized.txt

          diff \
            -u \
            expected-sha256sums.txt \
            release-assets/SHA256SUMS.normalized.txt

          (
            cd release-assets
            sha256sum --check ../expected-sha256sums.txt
          )

          cp \
            release-assets/cage_lite-0.1.0-py3-none-any.whl \
            dist/

          cp \
            release-assets/cage_lite-0.1.0.tar.gz \
            dist/

          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 2

          ls -l dist

      - name: Store verified distributions
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cage-lite-0.1.0-distributions
          path: |
            dist/cage_lite-0.1.0-py3-none-any.whl
            dist/cage_lite-0.1.0.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish-testpypi:
    name: Publish v0.1.0 to TestPyPI
    if: github.ref == 'refs/heads/main'
    needs:
      - prepare-v0-1-0

    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/cage-lite

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Retrieve verified distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: cage-lite-0.1.0-distributions
          path: dist/

      - name: Reverify distributions before publication
        run: |
          set -euo pipefail

          cat > expected-sha256sums.txt <<'EOF'
          2f82d54fa650291671800d1390259f3f668abe9901a0a2374051b87a682f0b84  cage_lite-0.1.0.tar.gz
          2e5de3fb8c9671f1d1163153d65cab86d3ea81fc76177f526d3d2512966da4e3  cage_lite-0.1.0-py3-none-any.whl
          EOF

          (
            cd dist
            sha256sum --check ../expected-sha256sums.txt
          )

          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 2

          ls -l dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          print-hash: true
          attestations: false

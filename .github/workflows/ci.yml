name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest build
          python -m pip install .

      - name: Verify installed package imports
        run: |
          python -c "import cage_lite"
          python -c "import cage_lite.core.receipt"
          python -c "import cage_lite.ui.app_data"

      - name: Run test suite
        run: python -m pytest -q

      - name: Build source and wheel distributions
        run: python -m build

      - name: Verify distribution contents
        shell: python
        run: |
          from pathlib import Path
          import tarfile
          import zipfile

          dist = Path("dist")
          wheels = list(dist.glob("*.whl"))
          source_distributions = list(dist.glob("*.tar.gz"))

          if len(wheels) != 1:
              raise SystemExit(
                  f"Expected one wheel in dist, found {len(wheels)}"
              )

          if len(source_distributions) != 1:
              raise SystemExit(
                  "Expected one source distribution in dist, "
                  f"found {len(source_distributions)}"
              )

          with zipfile.ZipFile(wheels[0]) as archive:
              wheel_files = set(archive.namelist())

          required_wheel_files = {
              "cage_lite/ui/assets/cage_logo.png",
              "cage_lite/ui/app.py",
              "cage_lite/ui/receipt_viewer_v1.py",
          }

          missing_wheel_files = required_wheel_files - wheel_files
          if missing_wheel_files:
              missing = ", ".join(sorted(missing_wheel_files))
              raise SystemExit(f"Wheel is missing required files: {missing}")

          if not any(
              name.endswith(".dist-info/licenses/LICENSE")
              for name in wheel_files
          ):
              raise SystemExit("Wheel does not contain LICENSE")

          if not any(
              name.endswith(".dist-info/licenses/NOTICE")
              for name in wheel_files
          ):
              raise SystemExit("Wheel does not contain NOTICE")

          with tarfile.open(source_distributions[0], "r:gz") as archive:
              source_files = set(archive.getnames())

          if not any(name.endswith("/LICENSE") for name in source_files):
              raise SystemExit("Source distribution does not contain LICENSE")

          if not any(name.endswith("/NOTICE") for name in source_files):
              raise SystemExit("Source distribution does not contain NOTICE")

          print(f"Verified {wheels[0].name}")
          print(f"Verified {source_distributions[0].name}")
